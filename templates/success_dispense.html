<!DOCTYPE html>
<html lang="en">
<head>

    <title>Dispensing Success</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #e8f5e9;
            text-align: center;
            padding: 50px;
        }
        .message-box {
            background: white;
            padding: 40px;
            display: inline-block;
            border-radius: 12px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
        }
        h1 {
            color: #43a047;
        }
        a {
            margin-top: 20px;
            display: inline-block;

            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
        }
        a:hover {
            background: #00838f;
        }
    </style>
</head>
<body>
    <div class="message-box">
        <h1>✅ Dispensing Successful!</h1>
        <p>Medicine dispensed for patient ID: {{ patient_id }}</p>

</html>
