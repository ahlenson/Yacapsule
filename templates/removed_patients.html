<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Archived Patients</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #ffe0b2;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
            max-width: 1100px;
            margin: auto;
            margin-top: 30px;
        }
        h1 {
            text-align: center;
            color: #ef6c00;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }
        th {
            background-color: #ffcc80;
            color: #ef6c00;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        button {
            padding: 8px 16px;
            background-color: #43a047;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #2e7d32;
        }
        .action-btns {
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Archived Patients</h1>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Medicine</th>
                    <th>Schedule Time</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for patient in patients %}
                <tr>
                    <td>{{ patient.id }}</td>
                    <td>{{ patient.name }}</td>
                    <td>{{ patient.age }}</td>
                    <td>{{ patient.medicine }}</td>
                    <td>{{ patient.schedule_time }}</td>
                    <td class="action-btns">
                        <form action="/restore_patient/{{ patient.id }}" method="post">
                            <button type="submit">Restore</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <div class="action-btns">
            <a href="/patients"><button>Back to Patient List</button></a>
        </div>
    </div>
</body>
</html>
